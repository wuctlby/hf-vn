savecfg: true
savecands: true

input: # files to use, set FD to null for binary classification
    prompt: /data/mdicosta/DplusFlow/OO/MLTraining/Train585377/AO2D_HF_LHC25j10_2nd_All_O2hfcanddplite_prompt_cent_0_100.parquet
    FD: /data/mdicosta/DplusFlow/OO/MLTraining/Train585377/AO2D_HF_LHC25j10_2nd_All_O2hfcanddplite_fd_cent_0_100.parquet
    data: /data/mdicosta/DplusFlow/OO/MLTraining/Train585481/AO2D_HF_LHC25ae_OO_pass2_small_2P3PDstar_O2hfcanddplite_data_cent_0_20.parquet
    treename: null

output:
    leg_labels: # legend labels, keep the right number of classes
        Bkg: Background
        Prompt: Prompt D$^+$
        FD: Feed-down D$^+$
    out_labels: # output labels, keep the right number of classes
        Bkg: Bkg
        Prompt: Prompt
        FD: FD
    dir: '/home/mdicosta/alice/hf-vn/mltraining/models/OO/020/pt_fine' # output dir

pt_ranges: # ranges in pt to split the data in the ml training and testing
    min: [0, 2, 3, 4, 5, 6, 8,  10] # list
    max: [2, 3, 4, 5, 6, 8, 10, 24] # list

data_prep:
    filt_bkg_mass: (fM < 1.74) or (fM > 2.00) # pandas query to select bkg candidates
    dataset_opt: max_signal  # change how the dataset is built, options available: 'equal', 'max_signal'
                             # 'equal' -> same number of prompt/FD/bkg (not using all the signal available)
                             # 'max_signal' -> try to use all the signal (prompt and FD) + add n_bkg = 2 * (n_prompt + n_FD)
    bkg_mult: [1., 1., 1., 1., 1., 1., 1., 1.] # list of multipliers for (nPrompt + nFD) used to determine nCandBkg in the 'max_signal' option
    seed_split: 42 # seed used for train_test_split(...)
    test_fraction: 0.1 # fraction of data used for test set and efficiencies

ml:
    raw_output: False # use raw_output (True) of probability (False) as output of the model
    roc_auc_average: 'macro' # 'macro' or 'weighted'
    roc_auc_approach: 'ovo'  # 'ovo' or 'ovr'
    training_columns: [ 
                        'fDecayLength',
                        'fDecayLengthXY',
                        'fCpa',
                        'fCpaXY',
                        'fImpactParameter0',
                        'fImpactParameter1',
                        'fImpactParameter2',
                        'fNSigTpcTofPi0',
                        'fNSigTpcTofKa1',
                        'fNSigTpcTofPi2',
                        'fChi2PCA'
                    ]
    hyper_par: [
        {'max_depth':5, 'learning_rate':0.04, 'n_estimators':700, 'min_child_weight':1.0, 'subsample':0.90, 'colsample_bytree':0.9, 'n_jobs':8, 'tree_method':hist, 'lambda':0.015},
        {'max_depth':5, 'learning_rate':0.04, 'n_estimators':700, 'min_child_weight':1.0, 'subsample':0.90, 'colsample_bytree':0.9, 'n_jobs':8, 'tree_method':hist, 'lambda':0.015},
        {'max_depth':5, 'learning_rate':0.04, 'n_estimators':700, 'min_child_weight':1.0, 'subsample':0.90, 'colsample_bytree':0.9, 'n_jobs':8, 'tree_method':hist, 'lambda':0.015},
        {'max_depth':5, 'learning_rate':0.04, 'n_estimators':700, 'min_child_weight':1.0, 'subsample':0.90, 'colsample_bytree':0.9, 'n_jobs':8, 'tree_method':hist, 'lambda':0.015},
        {'max_depth':5, 'learning_rate':0.04, 'n_estimators':700, 'min_child_weight':1.0, 'subsample':0.90, 'colsample_bytree':0.9, 'n_jobs':8, 'tree_method':hist, 'lambda':0.015},
        {'max_depth':5, 'learning_rate':0.04, 'n_estimators':700, 'min_child_weight':1.0, 'subsample':0.90, 'colsample_bytree':0.9, 'n_jobs':8, 'tree_method':hist, 'lambda':0.015},
        {'max_depth':5, 'learning_rate':0.04, 'n_estimators':700, 'min_child_weight':1.0, 'subsample':0.90, 'colsample_bytree':0.9, 'n_jobs':8, 'tree_method':hist, 'lambda':0.015},
        {'max_depth':5, 'learning_rate':0.04, 'n_estimators':700, 'min_child_weight':1.0, 'subsample':0.90, 'colsample_bytree':0.9, 'n_jobs':8, 'tree_method':hist, 'lambda':0.015},
    ]
    hyper_par_opt:
        do_hyp_opt: False # whether to do the parameter optimization
        njobs: -1 # number of parallel jobs used in hyper-parameter optimization, -1. to use all
        nfolds: 5 # number of folds used in cross validation
        initpoints: 5 # steps of random exploration you want to perform
        niter: 5 # steps for bayesian optimization
        ntrials: 10
        saveopthistory: True
        direction: 'maximize'
        bayes_opt_config: {
                          'max_depth': [2, 7],
                          'learning_rate': [0.005, 0.3],
                          'n_estimators': [50, 1000],
                          'min_child_weight': [1, 15],
                          'subsample': [0.7, 1.],
                          'colsample_bytree': [0.7, 1.]}
                          # configuration dictionary for optimize_params_bayes()

plot_cols: [ 
    'fM', 'fPt', 'fPhi', 'fDecayLength', 'fDecayLengthXY',
    'fCpa', 'fCpaXY', 'fImpactParameter0', 'fImpactParameter1',
    'fImpactParameter2', 'fNSigTpcTofPi0',   'fNSigTpcTofKa1',
    'fNSigTpcTofPi2', 'fChi2PCA' 
]
# list of variables to plot
log_scale_plots: True # use log scale for plots of train and test distributions
